<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="public/img/favicon-light.ico" type="image/x-icon"
        media="(prefers-color-scheme: light)">
    <link rel="shortcut icon" href="public/img/favicon-dark.ico" type="image/x-icon"
        media="(prefers-color-scheme: dark)">
        <link rel="stylesheet" href="public/css/auth.css">
    <title>Cadastre-se</title>
</head>
<body id="cadastro">
    <header>
        <button><</button>
    </header>
    <div class="container">
        <main>
            <div>
                <h1>Cadastre-se</h1>
            </div>
            <div class="box-inputs">
                <div class="campos">
                    <div>
                        <label for="ipt_nome_completo">Nome Completo: </label>
                        <input type="text" id="ipt_nome_completo">
                    </div>
                    <div>
                        <label for="ipt_nome_usuario">Nome de Usuário: </label>
                        <input type="text" id="ipt_nome_usuario">
                    </div>
                    <div>
                        <label for="ipt_dt_nasc">Data de Nascimento: </label>
                        <input type="date" id="ipt_dt_nasc">
                    </div>
                </div>
                <div class="campos">
                    <div>
                        <label for="ipt_email">E-mail: </label>
                        <input type="text" id="ipt_email">
                    </div>
                    <div>
                        <label for="ipt_senha">Senha: </label>
                        <input type="password" id="ipt_senha">
                    </div>
                    <div>
                        <label for="ipt_conf_senha">Confirmar senha: </label>
                        <input type="password" id="ipt_conf_senha">
                    </div>
                </div>
            </div>
            <div class="box-buttons">
                <button class="principal-cad">Cadastrar</button>
                <button class="secundario-cad">Já tenho login</button>
            </div>
        </main>
    </div>
</body>
</html>
